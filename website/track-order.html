<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Order – Coop Discounts</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="phero" style="background:linear-gradient(120deg,var(--red-d) 0%,var(--red) 100%)">
  <h1>📦 Track Your Order</h1>
  <p>Real-time order & delivery status</p>
</div>

<section class="sec">
<div class="ctr" style="max-width:720px;margin:0 auto">
  <div class="fs">
    <h3>Enter Order Details</h3>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <input class="fi" id="trOid" placeholder="Order ID (e.g. 61)" style="flex:1;min-width:180px" type="number">
      <button class="sbtn" style="width:auto;padding:11px 24px" onclick="trackOrder()">🔍 Track</button>
    </div>
    <p style="font-size:11px;color:#9ca3af;margin-top:8px">Or <a href="account.html" style="color:var(--red);font-weight:700">view all your orders</a> in My Account</p>
  </div>

  <div id="trackResult"></div>
</div>
</section>
<div id="site-footer"></div>
<script src="js/api.js?v=8.5"></script><script src="js/app.js?v=8.5"></script><script src="js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var oid = new URLSearchParams(location.search).get('oid');
  if(oid){ document.getElementById('trOid').value = oid; trackOrder(); }
});

async function trackOrder(){
  var oidVal = document.getElementById('trOid').value.trim();
  if(!oidVal){ toast('Please enter an order ID','err'); return; }
  var el = document.getElementById('trackResult');
  el.innerHTML = '<div style="text-align:center;padding:30px;color:#9ca3af"><span style="font-size:32px">⏳</span><div style="margin-top:10px;font-size:13px">Loading order...</div></div>';

  try{
    var r = await API.getOrder(parseInt(oidVal));
    var o = Array.isArray(r.data) ? r.data[0] : r.data;
    if(!o){ el.innerHTML='<div class="alert alert-err" style="justify-content:center">Order #'+oidVal+' not found</div>'; return; }

    var state = Array.isArray(o.state) ? o.state[1] : o.state || 'Draft';
    var stateKey = Array.isArray(o.state) ? o.state[0] : o.state || 'draft';
    // Normalize invoice_ids[] and picking_ids[] — backend may return [{id:..}] OR [12,34]
    var invoiceIds = (Array.isArray(o.invoice_ids) ? o.invoice_ids : (o.invoice_ids?[o.invoice_ids]:[]))
      .map(function(x){ return typeof x==='object'?x.id:x; });
    var pickingIds = (Array.isArray(o.picking_ids) ? o.picking_ids : (o.picking_ids?[o.picking_ids]:[]))
      .map(function(x){ return typeof x==='object'?x.id:x; });
    // Backends inconsistently use `order_line` or `order_lines`
    var lines = o.order_line || o.order_lines || [];
    var carrier = Array.isArray(o.carrier_id)?(typeof o.carrier_id[0]==='object'?o.carrier_id[0].name:o.carrier_id[1]):(o.carrier_id||'');
    var amtSub = parseFloat(o.amount_untaxed||0);
    var amtTax = parseFloat(o.amount_tax||0);
    var amtTotal = parseFloat(o.amount_total||0);

    // Progress steps
    var stepsDone = 0;
    if(stateKey !== 'draft') stepsDone = 1;
    if(stateKey === 'sale' || stateKey === 'done') stepsDone = 2;
    if(pickingIds.length) stepsDone = 3;
    if(stateKey === 'done' || (pickingIds.length && stepsDone >= 3)) stepsDone = 4;

    var steps = [
      {l:'Order Placed',ic:'📋',k:'draft'},
      {l:'Confirmed',ic:'✅',k:'sale'},
      {l:'Out for Delivery',ic:'🚚',k:'shipping'},
      {l:'Delivered',ic:'📦',k:'done'}
    ];

    var html = '<div class="fs">';
    // Header
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:20px">'
      +'<div><h2 style="font-size:18px;font-weight:900">'+(o.name||'Order #'+oidVal)+'</h2>'
      +'<div style="font-size:12px;color:#6b7280;margin-top:3px">Placed: '+(o.date_order||'').slice(0,16)+'</div>'
      +(carrier?'<div style="font-size:12px;color:#6b7280;margin-top:2px">🚚 '+carrier+'</div>':'')
      +'</div>'
      +'<div style="text-align:right">'
      +'<span class="os '+(stateKey==='done'?'os-ok':stateKey==='cancel'?'os-cancel':'os-proc')+'" style="display:block;margin-bottom:6px">'+state+'</span>'
      +'<div style="font-size:18px;font-weight:900;color:var(--red-d)">AED '+amtTotal.toFixed(2)+'</div>'
      +'</div></div>';

    // Progress tracker
    html += '<div style="position:relative;margin-bottom:28px;padding:0 10px">'
      +'<div style="position:absolute;top:18px;left:calc(10% + 20px);right:calc(10% + 20px);height:3px;background:#e5e7eb;z-index:0"></div>'
      +'<div style="position:absolute;top:18px;left:calc(10% + 20px);height:3px;background:var(--red);z-index:0;width:'+Math.min(100,((stepsDone-1)/3)*100)+'%;transition:width .5s"></div>'
      +'<div style="display:flex;justify-content:space-between;position:relative;z-index:1">'
      +steps.map(function(s,i){ var done=i<stepsDone;
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;flex:1">'
          +'<div style="width:40px;height:40px;border-radius:50%;border:3px solid '+(done?'var(--red)':'#e5e7eb')+';background:'+(done?'var(--red)':'#fff')+';display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .3s">'+(done?s.ic:'○')+'</div>'
          +'<div style="font-size:11px;font-weight:700;color:'+(done?'var(--red-d)':'#9ca3af')+';max-width:70px">'+s.l+'</div>'
          +'</div>';}).join('')
      +'</div></div>';

    // Order lines — handle multiple line shapes (product_id as [id,"Name"] OR [{id,name}])
    if(lines.length){
      html += '<div style="border-top:1.5px solid #f3f4f6;padding-top:16px;margin-bottom:16px">'
        +'<div style="font-size:13px;font-weight:800;margin-bottom:10px;color:#374151">Items in this order ('+lines.length+')</div>'
        +lines.map(function(l){
          var pnm='';
          if(Array.isArray(l.product_id)){
            var first=l.product_id[0];
            if(typeof first==='object' && first){ pnm = first.name || first.display_name || ''; }
            else { pnm = l.product_id[1] || ''; }
          }
          if(!pnm) pnm = l.name || l.display_name || '–';
          pnm = (pnm||'').replace(/^\[.*?\]\s*/,'').trim();
          var qty  = parseFloat(l.product_uom_qty || l.qty || 1);
          var unit = parseFloat(l.price_unit || 0);
          var sub  = parseFloat(l.price_subtotal || l.price_total || l.price_subtotal_incl || 0);
          if(!sub) sub = qty * unit;
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f9fafb;font-size:12px;gap:10px">'
            +'<div><div style="font-weight:700">'+pnm+'</div>'
            +'<div style="font-size:10px;color:#9ca3af">Qty: '+qty+(unit?' × AED '+unit.toFixed(2):'')+'</div></div>'
            +'<span style="font-weight:700;color:var(--red-d)">AED '+sub.toFixed(2)+'</span>'
            +'</div>';}).join('')
        + (amtSub||amtTax ? '<div style="margin-top:10px;padding-top:10px;border-top:1.5px solid #e5e7eb;font-size:12px">'
            +(amtSub?'<div style="display:flex;justify-content:space-between;color:#6b7280"><span>Subtotal</span><span>AED '+amtSub.toFixed(2)+'</span></div>':'')
            +(amtTax?'<div style="display:flex;justify-content:space-between;color:#6b7280;margin-top:3px"><span>VAT</span><span>AED '+amtTax.toFixed(2)+'</span></div>':'')
            +'<div style="display:flex;justify-content:space-between;font-weight:800;margin-top:6px;font-size:14px"><span>Total</span><span style="color:var(--red-d)">AED '+amtTotal.toFixed(2)+'</span></div>'
          +'</div>' : '')
        +'</div>';
    }

    if(o.note){
      html += '<div style="font-size:11px;color:#6b7280;margin-bottom:12px;padding:10px;background:#f9fafb;border-radius:8px;line-height:1.5"><strong>📝 Delivery Note:</strong><br>'+o.note+'</div>';
    }

    html += '</div>';
    el.innerHTML = html;

    // INVOICE block — fetch each invoice by id so we get its access_token for the PDF.
    // For Cash on Delivery still in Quotation, no invoice exists yet — show a placeholder.
    if(invoiceIds.length){
      var invHtml = '<div class="fs" style="margin-top:14px"><h3>🧾 Invoice'+(invoiceIds.length>1?'s':'')+' ('+invoiceIds.length+')</h3>';
      for(var i=0;i<invoiceIds.length;i++){
        try{
          var ir = await API.getInvoice(invoiceIds[i]);
          var inv = Array.isArray(ir.data)?ir.data[0]:ir.data;
          if(!inv) continue;
          var istate = Array.isArray(inv.state)?inv.state[1]:inv.state||'Draft';
          var pdfUrl = inv.access_token ? API.invPdfUrl(inv.id, inv.access_token) : (inv.access_url?API.PX+inv.access_url:'');
          invHtml += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid #f3f4f6">'
            +'<div><div style="font-size:14px;font-weight:800">'+(inv.name||'Invoice #'+inv.id)+'</div>'
            +'<div style="font-size:11px;color:#6b7280">Invoice ID: <strong>'+inv.id+'</strong></div>'
            +'<div style="font-size:11px;color:#6b7280">Date: '+(inv.invoice_date||inv.date||'').slice(0,10)+(inv.invoice_date_due?' · Due: '+(inv.invoice_date_due||'').slice(0,10):'')+'</div>'
            +'</div>'
            +'<div style="text-align:right">'
            +'<span class="os '+(istate.toLowerCase().includes('post')?'os-ok':istate.toLowerCase().includes('cancel')?'os-cancel':'os-draft')+'" style="display:block;margin-bottom:4px">'+istate+'</span>'
            +'<div style="font-weight:800;color:var(--red-d)">AED '+parseFloat(inv.amount_total||0).toFixed(2)+'</div>'
            +(inv.amount_residual&&parseFloat(inv.amount_residual)>0?'<div style="font-size:10px;color:#9ca3af">Due: AED '+parseFloat(inv.amount_residual).toFixed(2)+'</div>':'')
            +'</div>'
            +(pdfUrl?'<div style="width:100%;margin-top:8px"><a href="'+pdfUrl+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;padding:9px 18px;border-radius:8px;font-weight:700;font-size:12px;text-decoration:none">📄 Download Invoice PDF</a></div>':'<div style="width:100%;margin-top:6px;font-size:11px;color:#9ca3af">PDF available once the invoice is posted</div>')
            +'</div>';
        }catch(_){ invHtml += '<div style="padding:6px 0;font-size:11px;color:#9ca3af">Invoice #'+invoiceIds[i]+' — could not load</div>'; }
      }
      invHtml += '</div>';
      el.innerHTML += invHtml;
    } else if (stateKey==='draft' || state.toLowerCase().includes('quot')) {
      el.innerHTML += '<div class="fs" style="margin-top:14px"><h3>🧾 Invoice</h3>'
        +'<div style="font-size:12px;color:#92400e;background:#fffbea;border:1px solid #f5c518;border-radius:8px;padding:10px;line-height:1.5">Your invoice will be generated once payment is confirmed. For Cash on Delivery, the invoice is issued when the order is marked as paid.</div>'
        +'</div>';
    }

    // DELIVERY block — fetch every picking by id (orders can have multiple shipments)
    if(pickingIds.length){
      var delHtml = '<div class="fs" style="margin-top:14px"><h3>🚚 Delivery Details'+(pickingIds.length>1?' ('+pickingIds.length+' shipments)':'')+'</h3>';
      for(var j=0;j<pickingIds.length;j++){
        try{
          var delivR = await API.getDelivery(pickingIds[j]);
          var del = Array.isArray(delivR.data) ? delivR.data[0] : delivR.data;
          if(!del) continue;
          var dstate = Array.isArray(del.state)?del.state[1]:del.state||'Processing';
          var dstateKey = Array.isArray(del.state)?del.state[0]:del.state||'';
          var hasGeo = del.partner_latitude && del.partner_longitude;
          var dcarrier = Array.isArray(del.carrier_id)?(typeof del.carrier_id[0]==='object'?del.carrier_id[0].name:del.carrier_id[1]):(del.carrier_id||carrier||'');
          var isStorePickup = (dcarrier&&/pickup|store|collect/i.test(dcarrier)) || (del.description && /pickup|store/i.test(del.description));
          var mapUrl = hasGeo ? 'https://maps.google.com/?q='+del.partner_latitude+','+del.partner_longitude
                              : (isStorePickup?'https://maps.google.com/?q=Al+Ghandi+Complex+Nadd+Al+Hamar+Dubai':'');

          delHtml += '<div style="padding:10px 0;border-bottom:1px solid #f3f4f6">'
            +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px">'
            +'<div><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Reference</div><div style="font-weight:700;font-size:13px">'+(del.name||'#'+del.id)+'</div></div>'
            +'<div><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Status</div><span class="os '+(dstateKey==='done'?'os-ok':dstateKey==='cancel'?'os-cancel':'os-proc')+'">'+dstate+'</span></div>'
            +'<div><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Delivery ID</div><div style="font-size:12px"><strong>'+del.id+'</strong></div></div>'
            +(dcarrier?'<div><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Carrier</div><div style="font-size:12px">'+dcarrier+'</div></div>':'')
            +(del.scheduled_date?'<div><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Scheduled</div><div style="font-size:12px">'+(del.scheduled_date||'').slice(0,16)+'</div></div>':'')
            +(del.date_done?'<div><div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:3px">Completed</div><div style="font-size:12px">'+(del.date_done||'').slice(0,16)+'</div></div>':'')
            +'</div>'
            +(mapUrl?'<a href="'+mapUrl+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:#f3f4f6;color:#374151;padding:9px 16px;border-radius:8px;font-weight:700;font-size:12px;text-decoration:none">'+(isStorePickup?'🏪 Get Store Directions':'📍 Get Directions')+'</a>':'')
            +(isStorePickup?'<div style="margin-top:8px;font-size:11px;color:#6b7280">Store pickup: Al Ghandi Complex, Showroom 03, Nadd Al Hamar, Dubai</div>':'')
            +'</div>';
        }catch(_){ delHtml += '<div style="padding:6px 0;font-size:11px;color:#9ca3af">Picking #'+pickingIds[j]+' — could not load</div>'; }
      }
      delHtml += '</div>';
      el.innerHTML += delHtml;
    } else {
      // No picking yet (typical for Cash on Delivery before confirmation)
      el.innerHTML += '<div class="fs" style="margin-top:14px"><h3>🚚 Delivery Details</h3>'
        +'<div style="font-size:12px;color:#1e40af;background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:10px;line-height:1.5">Your delivery will be scheduled shortly after the order is confirmed. We\'ll send tracking details as soon as it ships.</div>'
        +'</div>';
    }

  }catch(e){
    el.innerHTML='<div class="alert alert-err">❌ '+e.message+'</div>';
  }
}
</script>
</body></html>
