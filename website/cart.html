<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Cart – Coop Discounts</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="ctr" style="padding-top:8px"><div class="bcnav"><a href="index.html">Home</a><span>›</span><span>Cart</span></div></div>

<section class="sec">
<div class="ctr">
  <h1 style="font-size:22px;font-weight:900;margin-bottom:20px">🛒 My Cart</h1>
  <div id="cartWrap" style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">

    <!-- CART ITEMS -->
    <div id="cartItems">
      <div style="text-align:center;padding:52px 20px">
        <div style="font-size:60px;margin-bottom:14px">⏳</div>
        <p style="color:#9ca3af;font-size:14px">Loading cart...</p>
      </div>
    </div>

    <!-- ORDER SUMMARY SIDEBAR -->
    <div class="chk-summary" id="cartSummary">
      <h3>Order Summary</h3>
      <div class="chk-row"><span style="color:#6b7280">Subtotal</span><span id="cSub" style="font-weight:700">AED 0.00</span></div>
      <div class="chk-row"><span style="color:#6b7280">Delivery</span><span style="font-weight:700;color:#16a34a">FREE</span></div>
      <div class="chk-row"><span style="color:#6b7280">VAT (5%)</span><span id="cVat" style="font-weight:700">AED 0.00</span></div>
      <div class="chk-total"><span>Total</span><span id="cTotal">AED 0.00</span></div>
      <a href="javascript:void(0)" onclick="if(Cart.count()===0){ toast('Your cart is empty', 'warn'); return; } location.href='checkout.html';" id="checkoutBtn" class="sbtn" style="margin-top:14px;display:block;text-align:center;text-decoration:none">Proceed to Checkout →</a>
      <a href="shop.html" style="display:block;text-align:center;color:var(--red);font-weight:700;font-size:13px;margin-top:10px">← Continue Shopping</a>

      <!-- PROMO CODE -->
      <div style="margin-top:16px;padding-top:16px;border-top:1.5px solid #f3f4f6">
        <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:7px">🎁 Promo / Coupon Code</div>
        <div style="display:flex;gap:7px">
          <input id="promoInp" class="fi" placeholder="Enter code" style="flex:1;padding:8px 11px;font-size:12px">
          <button onclick="applyPromo()" style="background:var(--yellow);color:#111;border:none;padding:8px 12px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">Apply</button>
        </div>
        <div id="promoMsg" style="margin-top:6px;font-size:11px;font-weight:600"></div>
      </div>
    </div>

  </div>
</div>
</section>
<div id="site-footer"></div>
<script src="js/api.js?v=8.5"></script><script src="js/app.js?v=8.5"></script><script src="js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  renderCart();
});

function renderCart(){
  var items = Cart.raw();
  var el = document.getElementById('cartItems');

  if(!items.length){
    document.getElementById('cartWrap').style.gridTemplateColumns='1fr';
    document.getElementById('cartSummary').style.display='none';
    el.innerHTML = '<div style="text-align:center;padding:60px 20px;background:#fff;border-radius:16px;border:1.5px solid #e5e7eb">'
      +'<div style="font-size:72px;margin-bottom:16px">🛒</div>'
      +'<h2 style="font-size:20px;font-weight:800;color:#374151;margin-bottom:8px">Your cart is empty</h2>'
      +'<p style="font-size:14px;color:#9ca3af;margin-bottom:20px">Explore our products and add something you like</p>'
      +'<a href="shop.html" style="display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;padding:12px 28px;border-radius:50px;font-weight:800;font-size:14px;text-decoration:none">🛍️ Start Shopping</a>'
      +'</div>';
    return;
  }

  // Calc totals
  var sub = Cart.total(), vat = sub*0.05, total = sub+vat;
  document.getElementById('cSub').textContent = 'AED '+sub.toFixed(2);
  document.getElementById('cVat').textContent = 'AED '+vat.toFixed(2);
  document.getElementById('cTotal').textContent = 'AED '+total.toFixed(2);

  el.innerHTML = '<div style="background:#fff;border-radius:16px;border:1.5px solid #e5e7eb;overflow:hidden">'
    +'<div style="padding:16px 20px;border-bottom:1.5px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center">'
    +'<span style="font-size:14px;font-weight:800">'+items.length+' Item'+(items.length>1?'s':'')+'</span>'
    +'<button onclick="clearCart()" style="background:none;border:none;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;transition:color .2s" onmouseover="this.style.color=\'#e41e26\'" onmouseout="this.style.color=\'#9ca3af\'">🗑️ Clear All</button>'
    +'</div>'
    + items.map(function(it, idx){
      var disc = it.standard_price && it.standard_price > it.price ? Math.round((1-it.price/it.standard_price)*100) : 0;
      return '<div style="display:flex;gap:14px;padding:16px 20px;border-bottom:1px solid #f9fafb;align-items:flex-start" id="citem-'+it.product_id+'">'
        // IMAGE
        +'<div style="width:80px;height:80px;background:#f9fafb;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid #e5e7eb">'
        +(it.image ? '<img src="'+it.image+'" style="width:100%;height:100%;object-fit:contain;display:block" onerror="this.style.display=\'none\'">':'<span style="font-size:30px">📦</span>')
        +'</div>'
        // INFO
        +'<div style="flex:1;min-width:0">'
        +'<a href="product.html?id='+it.product_id+'" style="font-size:13.5px;font-weight:700;color:#111;text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+it.name+'</a>'
        +'<div style="display:flex;align-items:center;gap:7px;margin:6px 0">'
        +'<span style="font-size:16px;font-weight:900;color:var(--red-d)">AED '+parseFloat(it.price||0).toFixed(2)+'</span>'
        +(disc > 0 ? '<span style="font-size:10px;font-weight:700;color:var(--red);background:var(--red-l);padding:2px 6px;border-radius:5px">-'+disc+'%</span>' : '')
        +'</div>'
        // QTY CONTROLS — synced to backend via updLine
        +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
        +'<div style="display:flex;border:2px solid var(--red);border-radius:8px;overflow:hidden">'
        +'<button onclick="changeQty('+it.product_id+',-1)" style="width:32px;height:32px;background:var(--red-l);color:var(--red-d);font-size:16px;font-weight:700;border:none;cursor:pointer;transition:background .2s" onmouseover="this.style.background=\'var(--red-100)\'" onmouseout="this.style.background=\'var(--red-l)\'">−</button>'
        +'<span style="min-width:36px;text-align:center;font-size:14px;font-weight:700;line-height:32px;color:var(--red-d)" id="qty-'+it.product_id+'">'+it.qty+'</span>'
        +'<button onclick="changeQty('+it.product_id+',1)" style="width:32px;height:32px;background:var(--red-l);color:var(--red-d);font-size:16px;font-weight:700;border:none;cursor:pointer;transition:background .2s" onmouseover="this.style.background=\'var(--red-100)\'" onmouseout="this.style.background=\'var(--red-l)\'">+</button>'
        +'</div>'
        +'<button onclick="removeItem('+it.product_id+')" style="color:#9ca3af;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;transition:color .2s" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'#9ca3af\'">🗑️ Remove</button>'
        +'<span id="syncing-'+it.product_id+'" style="font-size:10px;color:#9ca3af;display:none">Updating...</span>'
        +'</div>'
        +'</div>'
        // SUBTOTAL
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:15px;font-weight:800;color:#111" id="sub-'+it.product_id+'">AED '+((it.price*it.qty)||0).toFixed(2)+'</div>'
        +'</div>'
        +'</div>';
    }).join('')
    +'</div>';
}

async function changeQty(pid, delta){
  var syncEl = document.getElementById('syncing-'+pid);
  if(syncEl) syncEl.style.display='inline';
  await Cart.setQty(pid, delta);
  // Update UI without full re-render
  var items = Cart.raw();
  var item = items.find(function(i){ return i.product_id===pid; });
  if(item){
    var qEl = document.getElementById('qty-'+pid);
    var sEl = document.getElementById('sub-'+pid);
    if(qEl) qEl.textContent = item.qty;
    if(sEl) sEl.textContent = 'AED '+((item.price*item.qty)||0).toFixed(2);
    // Update totals
    var sub = Cart.total(), vat = sub*0.05;
    document.getElementById('cSub').textContent = 'AED '+sub.toFixed(2);
    document.getElementById('cVat').textContent = 'AED '+vat.toFixed(2);
    document.getElementById('cTotal').textContent = 'AED '+(sub+vat).toFixed(2);
    tick();
  } else {
    renderCart(); // Item removed
  }
  if(syncEl) syncEl.style.display='none';
}

function removeItem(pid){
  var el = document.getElementById('citem-'+pid);
  if(el){ el.style.opacity='0.4'; el.style.transition='opacity .2s'; }
  Cart.remove(pid);
  setTimeout(renderCart, 200);
}

function clearCart(){
  if(confirm('Remove all items from cart?')){ Cart.clear(); renderCart(); }
}

async function applyPromo(){
  var code = document.getElementById('promoInp').value.trim();
  var msg = document.getElementById('promoMsg');
  if(!code){ msg.textContent='Enter a loyalty / coupon code'; msg.style.color='#e41e26'; return; }
  if(!API.loggedIn()){ msg.textContent='Please sign in to use loyalty codes'; msg.style.color='#e41e26'; return; }
  msg.textContent='⏳ Validating "'+code+'"...'; msg.style.color='#9ca3af';
  try{
    var oid = await Cart.ensureOrder();
    if(!oid) throw new Error('Add items to your cart first');
    var result = await API.applyCouponToOrder(oid, code);
    var discTxt = result.discount > 0 ? ' (discount AED '+result.discount.toFixed(2)+')' : '';
    msg.textContent='✅ "'+code+'" applied'+discTxt+'. Continue to checkout to complete your order.';
    msg.style.color='#065f46';
    renderCart();
  }catch(e){ msg.textContent='❌ '+e.message; msg.style.color='#e41e26'; }
}
</script>
</body></html>
