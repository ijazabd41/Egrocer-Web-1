<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact – Coop Discounts</title><link rel="stylesheet" href="css/style.css"></head>
<body><div id="site-header"></div>
<div class="phero"><h1>📞 Contact Us</h1><p>We're here to help you</p></div>
<section class="sec"><div class="w" style="max-width:720px;margin:0 auto">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    ${[['📍','Visit Us','Al Ghandi Complex, Showroom 03, Nadd Al Hamar, Dubai, UAE'],['📞','Call Us','055 594 4719'],['✉️','Email Us','info@coop-discounts.com'],['🕐','Working Hours','Daily 8:00 AM – 12:00 AM']].map(([ic,t,d])=>`<div class="fs" style="display:flex;gap:14px;align-items:flex-start"><span style="font-size:28px"></span><div><div style="font-size:14px;font-weight:800;margin-bottom:4px"></div><div style="font-size:13px;color:#6b7280"></div></div></div>`).join('')}
  </div>
  <div class="fs"><h3>Send a Message</h3>
    <div class="fgrid">
      <div class="fg"><label class="fl">Name</label><input class="fi" id="ctName" placeholder="Your name"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="ctEmail" placeholder="you@email.com"></div>
      <div class="fg full"><label class="fl">Message</label><textarea class="fi" id="ctMsg" rows="4" style="resize:vertical" placeholder="How can we help you?"></textarea></div>
    </div>
    <button class="sbtn" style="width:auto;padding:11px 28px;margin-top:4px" onclick="toast('✅ Message sent! We will reply within 24 hours.')">Send Message</button>
  </div>
</div></section>
<div id="site-footer"></div>
<script src="js/api.js?v=8.5"></script><script src="js/app.js?v=8.5"></script><script src="js/layout.js"></script>
</body></html>
